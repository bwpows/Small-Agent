# deploy/nginx.conf
# Nginx 反向代理 — agent.bwpow.com
# API 转发到后端 8000，前端静态文件直接返回

# ── HTTP → HTTPS 重定向 ──
server {
    listen 80;
    server_name agent.bwpow.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS 主站 ──
server {
    listen 443 ssl http2;
    server_name agent.bwpow.com;

    ssl_certificate         /etc/nginx/ssl/bwpow.com.pem;
    ssl_certificate_key     /etc/nginx/ssl/bwpow.com.key;

    client_max_body_size 20M;
    proxy_read_timeout 120s;   # SSE 流式

    # Docker 内建 DNS，用于运行时解析上游地址
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── 后端 API（/api/* → 后端 8000，剥离前缀）──
    location /api/ {
        set $backend "agent-backend:8000";
        rewrite ^/api/(.*)$ /$1 break;   # 剥离 /api 前缀（proxy_pass 含变量，无法自动剥离；set 须在其前执行）
        proxy_pass http://$backend;
        proxy_http_version 1.1;

        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        set $backend "agent-backend:8000";
        proxy_pass http://$backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── 前端静态文件 ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
